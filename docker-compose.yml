services:
  backend:
    build:
      context: ./backend
    container_name: aiflow_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/aiflow.db
      - SECRET_KEY=dev-secret-key-change-in-production
      - BACKEND_CORS_ORIGINS=["http://localhost:5173","http://localhost:3000"]

  frontend:
    build:
      context: ./frontend
    container_name: aiflow_frontend
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  backend_data:
