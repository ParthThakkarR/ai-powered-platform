services:
  backend:
    build:
      context: ./backend
    container_name: aiflow_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/aiflow.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - BACKEND_CORS_ORIGINS=["http://localhost:5173","http://localhost:3000"]
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - redis

  worker:
    build:
      context: ./backend
    container_name: aiflow_worker
    command: celery -A core.celery_app worker -l info -c 2
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/aiflow.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - backend

  redis:
    image: redis:7-alpine
    container_name: aiflow_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  frontend:
    build:
      context: ./frontend
    container_name: aiflow_frontend
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
      - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - VITE_GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
    depends_on:
      - backend

volumes:
  backend_data:
  redis_data:
