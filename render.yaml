services:
  # Backend API
  - type: web
    name: aiflow-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && find . -name "*.db" -delete && python -c "from core.database import engine, Base; from models import *; Base.metadata.create_all(bind=engine)" && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./aiflow.db
      - key: BACKEND_CORS_ORIGINS
        value: '["https://aiflow-frontend.onrender.com","http://localhost:5173"]'
      - key: PYTHON_VERSION
        value: "3.12"
      - key: GOOGLE_CLIENT_ID
        value: "725149101137-96eg8i67nrpqipvhbatdtmqmsm2j7sv8.apps.googleusercontent.com"
      - key: GITHUB_CLIENT_ID
        value: "Ov23liQs6hYZkQxwS8Qb"
      - key: GITHUB_CLIENT_SECRET
        value: "79ac1c9c18204f234bb859b88d685aec6410654d"
      - key: FRONTEND_URL
        value: "https://aiflow-frontend.onrender.com"

  # Frontend (static site with SPA routing)
  - type: web
    runtime: static
    name: aiflow-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: "https://aiflow-backend-47ma.onrender.com/api/v1"
      - key: VITE_GOOGLE_CLIENT_ID
        value: "725149101137-96eg8i67nrpqipvhbatdtmqmsm2j7sv8.apps.googleusercontent.com"
      - key: VITE_GITHUB_CLIENT_ID
        value: "Ov23liQs6hYZkQxwS8Qb"
